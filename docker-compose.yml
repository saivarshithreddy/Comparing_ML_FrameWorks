services:
  web:
    build: .
    ports:
      - "8083:8080"
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app
      - TF_HOST=tensorflow-serving
      - TS_HOST=torchserve
    volumes:
      - ./serving_comparison_results:/app/serving_comparison_results
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - tensorflow-serving
      - torchserve

  # TensorFlow Serving service
  tensorflow-serving:
    image: tensorflow/serving:latest
    ports:
      - "8502:8501"
    environment:
      - MODEL_NAME=fashion
    volumes:
      - ./tensorflow_model:/models/fashion
    command: >
      --model_name=fashion
      --model_base_path=/models/fashion
      --rest_api_port=8501
      --rest_api_timeout_in_ms=30000
    restart: unless-stopped

  # TorchServe service
  torchserve:
    image: pytorch/torchserve:latest
    ports:
      - "8084:8080"
      - "8085:8081"
      - "8086:8082"
    volumes:
      - ./model_store:/home/model-server/model-store
      - ./config:/home/model-server/config
    command: >
      torchserve --start --model-store model-store --ts-config config/config.properties
    restart: unless-stopped

networks:
  default:
    name: ml-comparison-network

services:
  # Web Dashboard Service
  - type: web
    name: ml-frameworks-dashboard
    env: docker
    repo: https://github.com/YOUR_USERNAME/Comparing_ML_FrameWorks.git
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: . 
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONPATH
        value: /app
    autoDeploy: true
    
  # Optional: Background Worker for experiments
  - type: worker
    name: ml-experiments-worker
    env: docker
    repo: https://github.com/YOUR_USERNAME/Comparing_ML_FrameWorks.git
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    branch: main
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONPATH
        value: /app
      - key: WORKER_MODE
        value: "true"
    autoDeploy: true

# Optional: Add PostgreSQL for persistent storage
databases:
  - name: ml-comparison-db
    plan: free
    region: oregon
